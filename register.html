<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Smart Health Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {background: linear-gradient(135deg,#ff9a9e,#fad0c4);height: 100vh;}
        .card {
            max-width: 400px;
            margin: auto;
            margin-top: 6%;
            backdrop-filter: blur(10px);
            border-radius: 15px;
        }
    </style>
</head>
<body>
<div class="card p-4 text-dark bg-white bg-opacity-75 shadow-lg">
    <h3 class="text-center mb-3">Create Account 🚀</h3>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="alert alert-{{ category }} small text-center">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
        <input class="form-control mb-3" name="username" placeholder="Username" required>
        <input class="form-control mb-3" name="email" placeholder="Email" type="email" required>
        <input class="form-control mb-3" name="password" placeholder="Password" type="password" required>
        <input class="form-control mb-3" name="confirm_password" placeholder="Confirm Password" type="password" required>

        <button class="btn btn-dark w-100 mb-2">Sign Up</button>
    </form>

    <p class="text-center small">
        Already have an account? <a href="{{ url_for('login') }}" class="fw-bold">Login</a>
    </p>
</div>
</body>
</html>
