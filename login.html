<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Smart Health Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg,#00c6ff,#0072ff);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .circle { position: absolute; border-radius: 50%; opacity: 0.3; animation: float 6s ease-in-out infinite; }
        .circle:nth-child(1) { width: 100px; height: 100px; background: #fff; top: 10%; left: 15%; animation-delay: 0s;}
        .circle:nth-child(2) { width: 60px; height: 60px; background: #fffb; top: 50%; left: 70%; animation-delay: 2s;}
        .circle:nth-child(3) { width: 80px; height: 80px; background: #fff; top: 70%; left: 30%; animation-delay: 4s;}
        @keyframes float {0%,100%{transform:translateY(0);}50%{transform:translateY(-40px);}}

        .card { max-width: 400px; width: 100%; backdrop-filter: blur(12px); border-radius: 20px;
            background: rgba(0,0,0,0.6); padding: 40px 30px; position: relative; z-index: 1;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); color: #fff; }
        h3 { font-weight: 700; }
        .form-control { border-radius: 50px; }
        .btn { border-radius: 50px; font-weight: 600; }

        .animation-img { position: absolute; bottom: 0; right: 0; width: 250px; animation: run 2s steps(10) infinite; z-index: 0;}
        @keyframes run {0%{transform:translateX(0);}50%{transform:translateX(-10px);}100%{transform:translateX(0);}}

        .checklist { position: absolute; left: -220px; top: 50%; transform: translateY(-50%);
            width: 150px; height: 150px; border-radius: 50%; background: rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; }
        .checklist svg { width: 100px; height: 100px; }
        .checklist circle { fill: none; stroke: #00ffcc; stroke-width: 8; stroke-dasharray: 314; stroke-dashoffset: 314;
            transform: rotate(-90deg); transform-origin: 50% 50%; animation: drawCircle 2s forwards; }
        .checklist .check1, .checklist .check2, .checklist .check3 { fill: none; stroke: #00ffcc; stroke-width: 8; stroke-dasharray: 50; stroke-dashoffset: 50; }
        .checklist .check1 { animation: drawCheck 0.5s forwards; animation-delay: 2s; }
        .checklist .check2 { animation: drawCheck 0.5s forwards; animation-delay: 2.7s; }
        .checklist .check3 { animation: drawCheck 0.5s forwards; animation-delay: 3.4s; }
        @keyframes drawCircle { to { stroke-dashoffset: 0; } }
        @keyframes drawCheck { to { stroke-dashoffset: 0; } }

        @media (max-width: 992px) { .checklist, .animation-img { display: none; } }
    </style>
</head>
<body>

    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <div class="checklist">
        <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="50"></circle>
            <polyline class="check1" points="30,55 45,70 70,40"></polyline>
            <polyline class="check2" points="30,60 45,75 70,45"></polyline>
            <polyline class="check3" points="30,50 45,65 70,35"></polyline>
        </svg>
    </div>

    <div class="card text-center">
        <h3 class="mb-4">Welcome to<br>Smart Health Tracker👋</h3>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, msg in messages %}
            <div class="alert alert-{{ category }} small">{{ msg }}</div>
          {% endfor %}
        {% endwith %}

        <form method="POST">
            <input class="form-control mb-3" name="email" placeholder="Email" required>
            <input class="form-control mb-3" name="password" type="password" placeholder="Password" required>
            <button class="btn btn-light w-100 mb-3">Login</button>
        </form>

        <p class="small">New here? 
            <a href="{{ url_for('register') }}" class="text-info fw-bold">Create Account</a>
        </p>
    </div>

    <img src="{{ url_for('static', filename='running-girl.png') }}" class="animation-img" alt="">

</body>
</html>
