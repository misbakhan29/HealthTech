<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Smart Health Tracker</title>
</head>
<body>
    <h2>Sign Up</h2>
    <form action="/signup" method="POST">

        <button type="submit">Sign Up</button>
    </form>
    <p>Already have an account? <a href="/login">Login</a></p>
</body>
</html>
